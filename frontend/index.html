<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AIOps Alert · 智能监控告警</title>

    <!-- 阻塞式：在 Vue 加载前应用主题，避免首屏闪白 -->
    <script>
      (function () {
        try {
          var v = localStorage.getItem('aiops:theme-mode')
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches
          var dark = v === 'dark' ? true
                   : v === 'light' ? false
                   : sysDark
          var html = document.documentElement
          html.dataset.theme = dark ? 'dark' : 'light'
          html.classList.toggle('dark', dark)
        } catch (e) {}
      })()
    </script>

    <!-- 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
